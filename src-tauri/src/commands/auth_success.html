<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Modstack Auth Success</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Helvetica, Arial, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #121212; color: #fff;
  }

  @keyframes kaboom {
    0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
    60%  { transform: scale(1.25) rotate(8deg); }
    80%  { transform: scale(0.92) rotate(-4deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-420px) rotate(720deg); opacity: 0; }
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-ring {
    0%   { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.9); opacity: 0; }
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-6deg); }
    50%       { transform: rotate(6deg); }
  }

  .ext-wrap {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 340px;
    padding: 2.5rem 1rem 2rem; overflow: hidden; position: relative;
  }

  .confetti-layer { 
    position: fixed; 
    inset: 0; 
    pointer-events: none; 
    z-index: 999;
  }

  .bit {
    position: absolute; width: 10px; height: 10px;
    border-radius: 2px; animation: floatUp linear both;
  }

  .icon-stack {
    position: relative; width: 96px; height: 96px; margin-bottom: 1.5rem;
    animation: kaboom 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
  }

  .pulse {
    position: absolute; inset: 0; border-radius: 50%;
    background: #1D9E75; animation: pulse-ring 1.1s ease-out 0.5s infinite;
  }
  .pulse2 { animation-delay: 0.8s; }

  .icon-circle {
    position: absolute; inset: 0; border-radius: 50%;
    background: #1D9E75; display: flex;
    align-items: center; justify-content: center;
  }

  .icon-circle svg {
    width: 44px; height: 44px;
    animation: wiggle 0.4s ease-in-out 0.7s 2;
  }

  .big-title {
    font-size: 28px; font-weight: 500; color: #fff;
    margin: 0 0 0.4rem;
    animation: fadeSlide 0.4s 0.35s ease both; text-align: center;
  }

  .sub {
    font-size: 15px; color: #aaa; margin: 0;
    animation: fadeSlide 0.4s 0.5s ease both;
  }

.tag {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 999px; font-size: 13px;
    font-weight: 500; border: 0.5px solid #444;
    background: #1e1e1e; color: #fff;
    animation: fadeSlide 0.4s 0.65s ease both;
    margin-top: 1.5rem;
  }
</style>
</head>
<body>

<div class="ext-wrap">
  <div class="confetti-layer" id="confetti"></div>

  <div class="icon-stack">
    <div class="pulse"></div>
    <div class="pulse pulse2"></div>
    <div class="icon-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
  </div>

  <p class="big-title">Authentication complete</p>
  <p class="sub">You can close this window</p>

  <span class="tag">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#26215C"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <polyline points="16 11 18 13 22 9"/>
    </svg>
    Identity verified
  </span>
</div>

<script>
  setTimeout(() => window.close(), 3000);

  (function() {
    const colors = ['#7F77DD','#1D9E75','#D85A30','#D4537E','#EF9F27','#378ADD','#639922'];
    const layer = document.getElementById('confetti');
    for (let i = 0; i < 38; i++) {
      const b = document.createElement('div');
      b.className = 'bit';
      const size = 7 + Math.random() * 10;
      b.style.cssText = [
        `left:${10 + Math.random() * 80}%`,
        `bottom:${-50 + Math.random() * 50}px`,
        `width:${size}px`,
        `height:${size}px`,
        `background:${colors[Math.floor(Math.random() * colors.length)]}`,
        `border-radius:${Math.random() > 0.5 ? '50%' : '2px'}`,
        `animation-duration:${1.2 + Math.random() * 1.6}s`,
        `animation-delay:${0.2 + Math.random() * 0.8}s`,
        `opacity:0`
      ].join(';');
      layer.appendChild(b);
    }
  })();
</script>

</body>
</html>
